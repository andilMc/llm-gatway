{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Logs</h1>
    <p class="page-subtitle">Logs en temps r&eacute;el du syst&egrave;me</p>
</div>

<div class="panel">
    <div class="panel-header">
        <h2 class="panel-title">Flux de Logs</h2>
        <button class="btn btn-secondary btn-sm" onclick="clearLogs()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Effacer
        </button>
    </div>

    <div id="logs-container" class="logs-container">
        <p style="color: rgba(255,255,255,0.4);">Connexion en cours aux logs...</p>
    </div>
</div>

<script>
    function clearLogs() {
        document.getElementById('logs-container').innerHTML = '';
    }
    
    function connectLogsWebSocket() {
        const ws = new WebSocket('ws://' + window.location.host + '/admin/ws/logs');
        
        ws.onopen = function() {
            console.log('Logs WebSocket connected');
            document.getElementById('logs-container').innerHTML = '';
        };
        
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'log') {
                    const container = document.getElementById('logs-container');
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    
                    const timestamp = new Date(data.timestamp).toLocaleTimeString();
                    const levelClass = 'log-level-' + data.level.toLowerCase();
                    
                    entry.innerHTML = `
                        <span class="log-timestamp">${timestamp}</span>
                        <span class="${levelClass}">[${data.level}]</span>
                        <span style="color: rgba(255,255,255,0.5);">${data.logger}:</span>
                        <span style="color: rgba(255,255,255,0.8);">${data.message}</span>
                    `;
                    
                    container.appendChild(entry);
                    container.scrollTop = container.scrollHeight;
                    
                    while (container.children.length > 500) {
                        container.removeChild(container.firstChild);
                    }
                }
            } catch (e) {
                console.error('Error parsing log:', e);
            }
        };
        
        ws.onclose = function() {
            console.log('Logs WebSocket disconnected, reconnecting...');
            document.getElementById('logs-container').innerHTML = '<p style="color: rgba(255,255,255,0.4);">Connexion perdue, reconnexion...</p>';
            setTimeout(connectLogsWebSocket, 5000);
        };
        
        ws.onerror = function(e) {
            console.error('Logs WebSocket error:', e);
        };
    }
    
    connectLogsWebSocket();
</script>
{% endblock %}
