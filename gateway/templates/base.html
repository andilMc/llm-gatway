<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Gateway - Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: #1a1a1a; padding: 20px; border-bottom: 1px solid #333; margin-bottom: 30px; }
        header h1 { color: #00ff88; font-size: 1.8em; }
        nav { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 30px; }
        nav a { color: #888; text-decoration: none; margin-right: 25px; transition: color 0.3s; }
        nav a:hover { color: #00ff88; }
        nav a.active { color: #00ff88; font-weight: 600; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a1a; padding: 25px; border-radius: 10px; border-left: 4px solid #00ff88; }
        .stat-card.error { border-left-color: #ff4444; }
        .stat-card.warning { border-left-color: #ffaa00; }
        .stat-label { color: #888; font-size: 0.9em; margin-bottom: 8px; }
        .stat-value { font-size: 2em; font-weight: 700; color: #fff; }
        .panel { background: #1a1a1a; border-radius: 10px; padding: 25px; margin-bottom: 20px; }
        .panel h2 { color: #fff; margin-bottom: 20px; font-size: 1.3em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #00ff88; font-weight: 600; }
        tr:hover { background: #252525; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; }
        .status.healthy { background: #00ff8833; color: #00ff88; }
        .status.unhealthy { background: #ff444433; color: #ff4444; }
        .status.degraded { background: #ffaa0033; color: #ffaa00; }
        .btn { display: inline-block; padding: 10px 20px; background: #00ff88; color: #000; text-decoration: none; border-radius: 6px; font-weight: 600; border: none; cursor: pointer; transition: all 0.3s; }
        .btn:hover { background: #00cc6a; transform: translateY(-1px); }
        .btn-secondary { background: #333; color: #fff; }
        .btn-danger { background: #ff4444; color: #fff; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #888; }
        input, select, textarea { width: 100%; padding: 12px; background: #252525; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 1em; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #00ff88; }
        .logs-container { background: #0a0a0a; border-radius: 8px; padding: 15px; height: 400px; overflow-y: auto; font-family: 'Monaco', 'Consolas', monospace; font-size: 0.9em; }
        .log-entry { margin-bottom: 5px; padding: 3px 0; }
        .log-level-info { color: #00ff88; }
        .log-level-warning { color: #ffaa00; }
        .log-level-error { color: #ff4444; }
        .log-timestamp { color: #666; margin-right: 10px; }
        .opencode-config { background: #0a0a0a; padding: 20px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; overflow-x: auto; }
        .alert { padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .alert-success { background: #00ff8822; border: 1px solid #00ff88; color: #00ff88; }
        .alert-error { background: #ff444422; border: 1px solid #ff4444; color: #ff4444; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚀 LLM Gateway Admin</h1>
        </div>
    </header>
    
    <div class="container">
        <nav>
            <a href="/admin/" class="active">Dashboard</a>
            <a href="/admin/providers">Providers</a>
            <a href="/admin/api-keys">Clés API</a>
            <a href="/admin/models">Modèles</a>
            <a href="/admin/analytics">Analytics</a>
            <a href="/admin/logs">Logs</a>
        </nav>
        
        {% block content %}{% endblock %}
    </div>
</body>
</html>
